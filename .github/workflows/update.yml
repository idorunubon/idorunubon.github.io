name: Update events

on:
  schedule:
    - cron: '0 0 * * 1'   # ทุกวันจันทร์ 07:00 น. (เวลาไทย)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build events.json
        run: node build.js
      - name: Commit if changed
        run: |
          git config user.name "idorun-bot"
          git config user.email "actions@github.com"
          git add events.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update events.json [skip ci]"
            git push
          fi
