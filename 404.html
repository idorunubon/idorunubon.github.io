<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<title>ไม่พบหน้านี้ — ไอดูรัน (I Do Run)</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23F25C2A'/%3E%3Cpath d='M24 18v28l24-14z' fill='white'/%3E%3C/svg%3E">

<style>
body{margin:0;font-family:'Prompt',sans-serif;background:linear-gradient(135deg,#16335B,#0e2440);color:#fff;min-height:100vh;display:grid;place-items:center;text-align:center}

p{opacity:.85;margin:0 0 26px}
a{display:inline-block;background:#F25C2A;color:#fff;text-decoration:none;font-weight:600;padding:12px 26px;border-radius:30px}
a:hover{background:#d44a1c}
</style>
</head>
<body>
<div class="box">
  <div class="mark">▶</div>
  <h1>วิ่งหลงเส้นทางนิดหน่อย</h1>
  <p>ไม่พบหน้าที่ตามหา เพื่อนนักวิ่งกลับไปดูปฏิทินงานวิ่งที่หน้าแรกได้เลย</p>
  <a href="/">กลับหน้าแรก →</a>
</div>
